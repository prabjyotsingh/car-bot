<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CarBot - Nearby Workshops</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background-color: #000;
      color: #e6e6e6;
    }

    header {
      padding: 20px 30px;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #222;
      box-shadow: 0 0 10px rgba(165, 214, 16, 0.3);
    }

    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem;
      color: #a5d610;
    }

    .container {
      padding: 40px 20px;
      text-align: center;
    }

    .container h2 {
      color: #a5d610;
      font-size: 2rem;
      margin-bottom: 20px;
    }

    .map-box {
      margin-top: 30px;
      background-color: #111;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(165, 214, 16, 0.2);
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .btn {
      background-color: #a5d610;
      color: #000;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn:hover {
      background-color: #c0ef2b;
    }

    #status {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #ccc;
    }
  </style>
</head>
<body>

<header>
  <h1>CarBot</h1>
  <nav>
    <a href="index.html" style="color: #ccc; text-decoration: none; margin-right: 15px;">Home</a>
    <a href="dashboard.html" style="color: #ccc; text-decoration: none; margin-right: 15px;">Dashboard</a>
    <a href="my-cars.html" style="color: #ccc; text-decoration: none; margin-right: 15px;">My Cars</a>
    <a href="models.html" style="color: #ccc; text-decoration: none; margin-right: 15px;">AI Models</a>
    <a href="product.html" style="color: #ccc; text-decoration: none; margin-right: 15px;">Products</a>
    <a href="login.html" style="color: #ccc; text-decoration: none;">Login</a>
  </nav>
</header>

<div class="container">
  <h2>🔧 Find Workshops Near You</h2>
  <p>Click the button below to find nearby car workshops using your current location.</p>

  <div class="map-box">
    <button class="btn" onclick="findWorkshops()">📍 Locate Workshops</button>
    <div id="status"></div>
  </div>
</div>

<script>
  function findWorkshops() {
    const status = document.getElementById('status');

    if (navigator.geolocation) {
      status.textContent = 'Locating you...';
      navigator.geolocation.getCurrentPosition(position => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        status.textContent = 'Opening Google Maps...';
        const mapsUrl = `https://www.google.co.in/maps/search/car+workshops/@${lat},${lng},15z`;
        window.open(mapsUrl, '_blank');
      }, () => {
        status.textContent = 'Unable to retrieve your location.';
      });
    } else {
      status.textContent = 'Geolocation is not supported by your browser.';
    }
  }
</script>

</body>
</html>
