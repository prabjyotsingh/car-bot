<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarBot - AI Models</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #3498db;
      --secondary-color: #2ecc71;
      --danger-color: #e74c3c;
      --warning-color: #f39c12;
      --text-color: #333;
      --background-color: #f9f9f9;
      --card-background: #fff;
      --header-background: #2c3e50;
    }
    
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--background-color);
      color: var(--text-color);
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      background-color: var(--header-background);
      color: #fff;
      padding: 20px 0;
      text-align: center;
    }
    
    h1 {
      font-family: 'Orbitron', sans-serif;
      margin: 0;
    }
    
    nav {
      background-color: #34495e;
      padding: 10px 0;
    }
    
    nav .container {
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
    }
    
    nav a {
      color: #fff;
      text-decoration: none;
      padding: 10px 15px;
      margin: 0 5px;
      border-radius: 4px;
      transition: background-color 0.3s;
    }
    
    nav a:hover {
      background-color: #2c3e50;
    }
    
    .model-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 30px;
    }
    
    .model-card {
      background-color: var(--card-background);
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      flex: 1 1 calc(50% - 20px);
      min-width: 300px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .model-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }
    
    .model-header {
      padding: 20px;
      background-color: var(--primary-color);
      color: white;
    }
    
    .model-header h2 {
      margin: 0;
      font-weight: 700;
    }
    
    .model-header p {
      margin: 5px 0 0;
      font-size: 0.9rem;
      opacity: 0.9;
    }
    
    .model-body {
      padding: 20px;
    }
    
    .model-section {
      margin-bottom: 25px;
    }
    
    .model-section h3 {
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      margin-top: 0;
      color: var(--primary-color);
    }
    
    .feature-list {
      list-style-type: none;
      padding: 0;
    }
    
    .feature-list li {
      padding: 8px 0;
      border-bottom: 1px dashed #eee;
    }
    
    .feature-list li:last-child {
      border-bottom: none;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: bold;
      text-transform: uppercase;
    }
    
    .status-loaded {
      background-color: var(--secondary-color);
      color: white;
    }
    
    .status-unavailable {
      background-color: var(--danger-color);
      color: white;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 1.2rem;
      color: #777;
    }
    
    .error {
      background-color: #fee;
      color: var(--danger-color);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      margin-top: 30px;
    }
    
    .model-architecture {
      background-color: #f8f9fa;
      padding: 15px;
      border-radius: 6px;
    }
    
    .model-architecture code {
      display: block;
      font-family: monospace;
      padding: 5px 0;
    }
    
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: var(--primary-color);
      text-decoration: none;
    }
    
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>CarBot AI Models</h1>
      <p>Advanced machine learning models powering your automotive assistant</p>
    </div>
  </header>
  
  <nav>
    <div class="container">
      <div>
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="my-cars.html">My Cars</a>
        <a href="models.html">AI Models</a>
        <a href="product.html">Products</a>
        <a href="workshop.html">Workshops</a>
      </div>
      <div>
        <a href="login.html">Login</a>
      </div>
    </div>
  </nav>
  
  <div class="container">
    <div class="loading" id="loading">Loading model information...</div>
    <div id="error" class="error" style="display: none;"></div>
    <div class="model-cards" id="modelCards"></div>
    
    <a href="/" class="back-link">← Back to Home</a>
  </div>
  
    <!-- Chatbot toggle + unified chatbox -->
    <button class="chat-toggle" onclick="toggleChat()" aria-label="Open chat">💬</button>
    <div class="chatbox" id="chatbox" aria-live="polite" style="display:none;">
      <div class="chat-header">CarBot Chat</div>
      <div class="chat-messages" id="messages">
        <div><strong>CarBot:</strong> Hello! How can I help with your car today?</div>
      </div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Ask something..." aria-label="Chat input" />
        <button onclick="sendChat()">Send</button>
      </div>
    </div>

    <script src="static/js/index.js"></script>

    <script>
    // Fetch model information from API
    document.addEventListener('DOMContentLoaded', () => {
      fetch('/model-info')
        .then(response => {
          if (!response.ok) {
            throw new Error('Failed to fetch model information');
          }
          return response.json();
        })
        .then(data => {
          document.getElementById('loading').style.display = 'none';
          
          // Display each model
          const modelCardsContainer = document.getElementById('modelCards');
          const models = data.models;
          
          Object.keys(models).forEach(modelKey => {
            const model = models[modelKey];
            
            // Create card element
            const card = document.createElement('div');
            card.className = 'model-card';
            
            // Header
            const header = document.createElement('div');
            header.className = 'model-header';
            header.innerHTML = `
              <h2>${model.name}</h2>
              <p>v${model.version} · ${model.created_at} · 
                <span class="status-badge status-${model.status}">${model.status}</span>
              </p>
            `;
            
            // Body
            const body = document.createElement('div');
            body.className = 'model-body';
            
            // Description
            const descSection = document.createElement('div');
            descSection.className = 'model-section';
            descSection.innerHTML = `
              <h3>Description</h3>
              <p>${model.description}</p>
            `;
            
            // Architecture
            const archSection = document.createElement('div');
            archSection.className = 'model-section';
            archSection.innerHTML = `
              <h3>Model Architecture</h3>
              <div class="model-architecture">
                <code>Type: ${model.architecture.type}</code>
                ${model.architecture.layers.map(layer => `<code>→ ${layer}</code>`).join('')}
              </div>
            `;
            
            // Input Features
            const inputSection = document.createElement('div');
            inputSection.className = 'model-section';
            inputSection.innerHTML = `<h3>Input Features</h3>`;
            
            if (Array.isArray(model.input_features)) {
              // For engine model
              const featureList = document.createElement('ul');
              featureList.className = 'feature-list';
              
              model.input_features.forEach(feature => {
                const item = document.createElement('li');
                item.innerHTML = `<strong>${feature.name}</strong>: ${feature.description}`;
                featureList.appendChild(item);
              });
              
              inputSection.appendChild(featureList);
            } else {
              // For chatbot model
              inputSection.innerHTML += `
                <ul class="feature-list">
                  <li><strong>Type:</strong> ${model.input_features.type}</li>
                  <li><strong>Max Length:</strong> ${model.input_features.max_length} tokens</li>
                  <li><strong>Vocabulary Size:</strong> ${model.input_features.vocabulary_size}</li>
                </ul>
              `;
            }
            
            // Training Info
            const trainingSection = document.createElement('div');
            trainingSection.className = 'model-section';
            trainingSection.innerHTML = `
              <h3>Training Information</h3>
              <ul class="feature-list">
                <li><strong>Dataset Size:</strong> ${model.training.dataset_size} samples</li>
                <li><strong>Epochs:</strong> ${model.training.epochs}</li>
                <li><strong>Batch Size:</strong> ${model.training.batch_size}</li>
                <li><strong>Validation Split:</strong> ${model.training.validation_split * 100}%</li>
              </ul>
            `;
            
            // Assemble card
            body.appendChild(descSection);
            body.appendChild(archSection);
            body.appendChild(inputSection);
            body.appendChild(trainingSection);
            
            card.appendChild(header);
            card.appendChild(body);
            
            modelCardsContainer.appendChild(card);
          });
        })
        .catch(error => {
          document.getElementById('loading').style.display = 'none';
          const errorElem = document.getElementById('error');
          errorElem.style.display = 'block';
          errorElem.textContent = `Error: ${error.message}`;
        });
    });
  </script>
</body>
</html>
